version: '3.1'
services:
  web:
    build: .
    depends_on:
      - db
    ports:
      - "8061:8069"
    volumes:
      - ./odoo.conf:/etc/odoo/odoo.conf
      - ./addons:/mnt/extra-addons
      - odoo-data:/var/lib/odoo
  db:
    image: postgres:15
    ports:
      - "5431:5432"
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - ./data:/var/lib/postgresql/data

volumes:
  odoo-data:
